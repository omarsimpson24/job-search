<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar — Job Search Console</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f6fa; color: #1a2744; min-height: 100vh; }
  .header { background: #1a2744; padding: 24px 28px 20px; border-bottom: 3px solid #c9a84c; }
  .header-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #c9a84c; font-family: sans-serif; margin-bottom: 4px; }
  .header h1 { font-size: 24px; font-weight: 400; color: #fff; letter-spacing: -0.5px; }
  .header p { margin-top: 4px; font-size: 12px; color: #8892a4; font-family: sans-serif; }
  .controls { background: #fff; border-bottom: 1px solid #dde2ed; padding: 14px 28px; }
  .controls-inner { max-width: 860px; margin: 0 auto; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn-group { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #dde2ed; }
  .btn-group button { padding: 8px 14px; border: none; cursor: pointer; font-size: 12px; font-family: sans-serif; background: #fff; color: #1a2744; font-weight: 400; border-right: 1px solid #dde2ed; }
  .btn-group button:last-child { border-right: none; }
  .btn-group button.active { background: #1a2744; color: #fff; font-weight: 700; }
  .btn-group.slate button.active { background: #2d3f6b; }
  .search-btn { padding: 8px 22px; background: #c9a84c; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-family: sans-serif; font-weight: 700; cursor: pointer; }
  .search-btn:disabled { background: #8892a4; cursor: not-allowed; }
  .body { max-width: 860px; margin: 0 auto; padding: 20px 28px; }
  .loading { text-align: center; padding: 60px 0; }
  .loading p { font-family: sans-serif; font-size: 13px; color: #8892a4; }
  .dots { display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #c9a84c; animation: pulse 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  .empty { text-align: center; padding: 70px 0; }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-family: sans-serif; color: #8892a4; font-size: 13px; }
  .empty small { display: block; margin-top: 6px; font-family: sans-serif; color: #8892a4; font-size: 11px; }
  .error { padding: 14px; background: #fdecea; border: 1px solid #c0392b; border-radius: 6px; font-family: sans-serif; font-size: 13px; color: #c0392b; margin-bottom: 16px; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .results-count { font-family: sans-serif; font-size: 13px; color: #8892a4; }
  .results-count span { font-weight: 700; color: #1a2744; font-size: 20px; }
  .new-badge { margin-left: 8px; background: #e8f5ee; color: #1a7a4a; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .results-hint { font-size: 11px; color: #8892a4; font-family: sans-serif; }
  .job-card { background: #fff; border: 1px solid #dde2ed; border-radius: 8px; margin-bottom: 8px; cursor: pointer; overflow: hidden; transition: all 0.12s; }
  .job-card.expanded { border-color: #1a2744; box-shadow: 0 4px 16px rgba(26,39,68,0.1); }
  .job-card-header { padding: 14px 18px; display: flex; gap: 14px; align-items: flex-start; }
  .job-num { min-width: 26px; height: 26px; border-radius: 50%; background: #f5f6fa; color: #8892a4; display: flex; align-items: center; justify-content: center; font-size: 11px; font-family: sans-serif; font-weight: 700; margin-top: 2px; flex-shrink: 0; }
  .job-card.expanded .job-num { background: #1a2744; color: #fff; }
  .job-info { flex: 1; }
  .job-top { display: flex; justify-content: space-between; gap: 12px; }
  .job-title { font-size: 14px; font-weight: 700; color: #1a2744; }
  .job-company { margin-top: 3px; font-family: sans-serif; font-size: 13px; color: #2d3f6b; font-weight: 600; }
  .job-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .job-salary { font-size: 13px; font-weight: 700; color: #1a2744; font-family: sans-serif; }
  .job-location { font-size: 11px; color: #8892a4; font-family: sans-serif; }
  .new-tag { background: #e8f5ee; color: #1a7a4a; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; font-family: sans-serif; }
  .job-meta { margin-top: 6px; display: flex; gap: 14px; font-family: sans-serif; font-size: 11px; color: #8892a4; }
  .job-body { border-top: 1px solid #dde2ed; padding: 14px 18px 18px 58px; background: #fafbfc; }
  .job-desc { margin: 0 0 14px; font-size: 13px; color: #3d4e70; line-height: 1.6; font-family: sans-serif; }
  .job-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .apply-btn { padding: 9px 20px; background: #c9a84c; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-family: sans-serif; font-weight: 700; cursor: pointer; }
  .view-btn { padding: 9px 16px; background: #fff; color: #1a2744; border: 1px solid #dde2ed; border-radius: 6px; font-size: 12px; font-family: sans-serif; font-weight: 600; text-decoration: none; display: inline-block; }
  .tailoring-box { padding: 10px 14px; background: #f0f4ff; border: 1px solid #d0d8f0; border-radius: 6px; font-size: 12px; font-family: sans-serif; color: #2d3f6b; line-height: 1.6; }
  .tailoring-box a { color: #c9a84c; font-weight: 700; }
  .footer-note { margin-top: 20px; padding: 12px 14px; background: #f0f4ff; border: 1px solid #d0d8f0; border-radius: 6px; font-family: sans-serif; font-size: 12px; color: #2d3f6b; line-height: 1.6; }
  .source-tag { font-size: 10px; color: #8892a4; font-family: sans-serif; margin-left: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Omar · Job Search Console · Live Listings</div>
  <h1>Director-Level Opportunities</h1>
  <p>Strategy · AI Transformation · Business Operations · Chief of Staff</p>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="btn-group" id="geo-group">
      <button class="active" data-geo="All">All Geographies</button>
      <button data-geo="RTP">RTP / Raleigh-Durham</button>
      <button data-geo="SoCal">Southern California</button>
    </div>
    <div class="btn-group slate" id="days-group">
      <button data-days="7">Last 7 days</button>
      <button data-days="14">Last 14 days</button>
      <button class="active" data-days="30">All open roles</button>
    </div>
    <button class="search-btn" id="search-btn" onclick="runSearch()">Search Jobs</button>
  </div>
</div>

<div class="body" id="body">
  <div class="empty">
    <div class="icon">🔍</div>
    <p>Set filters and click <strong>Search Jobs</strong></p>
    <small>Live Google Jobs listings · Real postings only</small>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rvqkdtmmuzzxzynrigke.supabase.co/functions/v1/adzuna-proxy';
const SUPABASE_KEY = 'sb_publishable_muqo_BkW9QLoeeFECTDY_g_yO7yOcpB';

const QUERIES = {
  RTP: [
    { what: 'director strategy operations', where: 'Raleigh NC' },
    { what: 'director AI transformation business', where: 'Raleigh Durham NC' },
    { what: 'chief of staff technology', where: 'Raleigh NC' },
    { what: 'VP business operations strategy', where: 'Raleigh Durham NC' },
  ],
  SoCal: [
    { what: 'director strategy operations', where: 'Los Angeles CA' },
    { what: 'director AI transformation business', where: 'Los Angeles CA' },
    { what: 'chief of staff technology', where: 'San Diego CA' },
    { what: 'VP business operations strategy', where: 'Los Angeles CA' },
  ],
};

let geo = 'All';
let days = 30;
let expandedId = null;
let applied = new Set();

document.querySelectorAll('#geo-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#geo-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    geo = btn.dataset.geo;
  });
});

document.querySelectorAll('#days-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#days-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    days = parseInt(btn.dataset.days);
  });
});

function isNewJob(dateStr) {
  if (!dateStr) return false;
  const s = dateStr.toLowerCase();
  if (s.includes('hour') || s.includes('today') || s.includes('just')) return true;
  const m = s.match(/(\d+)\s*day/);
  if (m && parseInt(m[1]) <= 7) return true;
  return false;
}

function withinDays(dateStr, maxDays) {
  if (maxDays === 30) return true;
  if (!dateStr) return true;
  const s = dateStr.toLowerCase();
  if (s.includes('hour') || s.includes('today') || s.includes('just')) return true;
  const m = s.match(/(\d+)\s*day/);
  if (m) return parseInt(m[1]) <= maxDays;
  const w = s.match(/(\d+)\s*week/);
  if (w) return parseInt(w[1]) * 7 <= maxDays;
  return true;
}

function renderJobs(jobs) {
  const body = document.getElementById('body');
  if (!jobs || jobs.length === 0) {
    body.innerHTML = '<div class="error">No listings found. Try expanding filters or broadening the geography.</div>';
    return;
  }

  const newCount = jobs.filter(j => isNewJob(j.detected_extensions && j.detected_extensions.posted_at || j.date)).length;

  let html = '<div class="results-header"><div class="results-count"><span>' + jobs.length + '</span> live roles found';
  if (newCount > 0) html += '<span class="new-badge">' + newCount + ' NEW</span>';
  html += '</div><div class="results-hint">Click to expand · Apply to tailor</div></div>';

  jobs.forEach((job, idx) => {
    const id = 'job-' + idx;
    const isExpanded = expandedId === id;
    const wasApplied = applied.has(id);
    const posted = (job.detected_extensions && job.detected_extensions.posted_at) || job.date || '';
    const isNew = isNewJob(posted);
    const salary = (job.detected_extensions && job.detected_extensions.salary) || job.salary || '';
    const location = job.location || '';
    const via = job.via || '';
    const geoLabel = job._geo === 'RTP' ? 'Raleigh-Durham' : 'Southern California';
    const link = job.apply_options && job.apply_options[0] && job.apply_options[0].link ? job.apply_options[0].link : (job.related_links && job.related_links[0] ? job.related_links[0].link : '#');

    html += '<div class="job-card' + (isExpanded ? ' expanded' : '') + '" id="' + id + '" onclick="toggleCard(\'' + id + '\')">';
    html += '<div class="job-card-header">';
    html += '<div class="job-num">' + (idx + 1) + '</div>';
    html += '<div class="job-info"><div class="job-top"><div>';
    html += '<div class="job-title">' + (job.title || '') + (isNew ? ' <span class="new-tag">NEW</span>' : '') + '</div>';
    html += '<div class="job-company">' + (job.company_name || '') + '</div>';
    html += '</div><div class="job-right">';
    if (salary) html += '<div class="job-salary">' + salary + '</div>';
    html += '<div class="job-location">' + location + '</div>';
    html += '</div></div>';
    html += '<div class="job-meta"><span>📅 ' + (posted || 'Recently') + '</span><span>📍 ' + geoLabel + '</span>';
    if (via) html += '<span class="source-tag">via ' + via + '</span>';
    html += '</div></div></div>';

    if (isExpanded) {
      html += '<div class="job-body">';
      if (job.description) {
        html += '<p class="job-desc">' + job.description.slice(0, 500) + (job.description.length > 500 ? '...' : '') + '</p>';
      }
      html += '<div class="job-actions">';
      if (!wasApplied) {
        html += '<button class="apply-btn" onclick="applyJob(event,\'' + id + '\')">⚡ Apply — Tailor My Materials</button>';
        if (link !== '#') html += '<a class="view-btn" href="' + link + '" target="_blank" onclick="event.stopPropagation()">View Posting ↗</a>';
      } else {
        html += '<div class="tailoring-box">✓ <strong>Tailoring initiated.</strong> Copy the full JD from the <a href="' + link + '" target="_blank" onclick="event.stopPropagation()">full posting ↗</a> and paste it into Claude.</div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
  });

  html += '<div class="footer-note"><strong>How to apply:</strong> Expand any role → <strong>Apply — Tailor My Materials</strong> → copy the full JD → paste into Claude.</div>';
  body.innerHTML = html;
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  renderJobs(window._jobs || []);
}

function applyJob(e, id) {
  e.stopPropagation();
  applied.add(id);
  renderJobs(window._jobs || []);
}

async function runSearch() {
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  document.getElementById('body').innerHTML = '<div class="loading"><p>Fetching live Google Jobs listings...</p><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';

  const geos = geo === 'All' ? ['RTP', 'SoCal'] : [geo];
  const queries = geos.flatMap(g => QUERIES[g].map(q => ({ ...q, geoKey: g })));

  try {
    const results = await Promise.allSettled(
      queries.map(({ what, where, geoKey }) =>
        fetch(SUPABASE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'apikey': SUPABASE_KEY,
          },
          body: JSON.stringify({ what, where, days }),
        })
        .then(r => r.json())
        .then(data => ({ jobs: data.jobs || [], geoKey }))
      )
    );

    const seen = new Set();
    const merged = [];

    results.forEach(r => {
      if (r.status !== 'fulfilled') return;
      (r.value.jobs || []).forEach(job => {
        const key = job.title + job.company_name;
        if (seen.has(key)) return;
        seen.add(key);
        const posted = (job.detected_extensions && job.detected_extensions.posted_at) || '';
        if (!withinDays(posted, days)) return;
        merged.push({ ...job, _geo: r.value.geoKey });
      });
    });

    window._jobs = merged;
    renderJobs(merged);
  } catch (err) {
    document.getElementById('body').innerHTML = '<div class="error">Search failed: ' + err.message + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search Jobs';
  }
}
</script>
</body>
</html>
